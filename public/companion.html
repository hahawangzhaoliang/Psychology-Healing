<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的伙伴 - 心晴空间</title>
    <meta name="description" content="选择你的专属虚拟动物伙伴，开启温暖的心理疗愈陪伴之旅">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/neuroaesthetics.css">
    <script src="js/cache.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#f0faf7', 100: '#d9f2eb', 200: '#b5ddd3', 300: '#8ac4b5', 400: '#7CB8A8', 500: '#5A9A8A', 600: '#4a8a7a' },
                        warm: { 50: '#fdfbf9', 100: '#F5E6D3', 200: '#E8D5C4', 300: '#d4c4b0' }
                    }
                }
            }
        }
    </script>
    <style>
        /* 动物动效样式 */
        .companion-float {
            animation: companionFloat 3s ease-in-out infinite;
        }
        .companion-bounce {
            animation: companionBounce 1.5s ease-in-out infinite;
        }
        .companion-sway {
            animation: companionSway 2.5s ease-in-out infinite;
        }
        .companion-breathe {
            animation: companionBreathe 4s ease-in-out infinite;
        }
        
        @keyframes companionFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
        }
        @keyframes companionBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.05); }
        }
        @keyframes companionSway {
            0%, 100% { transform: translateX(0) rotate(-5deg); }
            50% { transform: translateX(10px) rotate(5deg); }
        }
        @keyframes companionBreathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* 选择卡片样式 */
        .companion-card {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }
        .companion-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px -10px rgba(92, 184, 168, 0.3);
        }
        .companion-card.selected {
            border-color: var(--color-primary-400, #5cb8a8);
            box-shadow: 0 0 0 3px rgba(92, 184, 168, 0.3), 0 10px 30px -10px rgba(92, 184, 168, 0.4);
        }
        .companion-card.selected::after {
            content: '✓';
            position: absolute;
            top: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            background: var(--color-primary-400, #5cb8a8);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
        }
        
        /* 预览区域 */
        .preview-stage {
            background: linear-gradient(135deg, #f0faf7 0%, #d9f2eb 50%, #b5ddd3 100%);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
        }
        .preview-stage::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(to top, rgba(92, 184, 168, 0.1), transparent);
            border-radius: 0 0 24px 24px;
        }
        .preview-companion {
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.15));
        }
        
        /* 星星装饰 */
        .sparkle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ffd700;
            border-radius: 50%;
            animation: sparkle 1.5s ease-in-out infinite;
        }
        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }
        
        /* 心动效果 */
        .heart-effect {
            position: absolute;
            font-size: 20px;
            animation: floatUp 1s ease-out forwards;
            pointer-events: none;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(0.5); }
        }
        
        /* 引导提示 */
        .guide-dot {
            width: 10px;
            height: 10px;
            background: var(--color-primary-400, #5cb8a8);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
        }
    </style>
</head>

                <!-- 保存按钮 -->

    <!-- Toast 提示 -->
    <div id="toast" class="fixed top-20 left-1/2 transform -translate-x-1/2 px-6 py-3 bg-primary-500 text-white rounded-full shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none z-50">
        <span id="toastMessage"></span>
    </div>

    <script src="js/neuroaesthetics.js"></script>
    <script>
        // 动物数据 - 使用原始 PNG 图片
        const companions = [
            { id: 'rabbit',   name: '爱心兔兔',    filename: '爱心兔兔.png',    animation: 'bounce',  color: '#E879A9', emoji: '🐰', personality: '爱心守护者',      story: '来自爱之森林的守护兔，胸前总是发着温暖的粉红光芒。她相信每一颗心都值得被珍爱，每一滴眼泪都能化为成长的养分。' },
            { id: 'dog',      name: '金毛陪伴犬',  filename: '金毛陪伴犬.png',  animation: 'sway',   color: '#E8A838', emoji: '🐕', personality: '无言的拥抱',      story: '曾经在无数个深夜默默守候在主人床边的大金毛，离开汪星球后化为一缕阳光，永远守在你身边。它不懂复杂的道理，只懂得：你在，我就安心。' },
            { id: 'cat',      name: '困困猫咪',    filename: '困困猫咪.png',    animation: 'breathe', color: '#9B8EC4', emoji: '🐱', personality: '慵懒治愈师',      story: '一只总是睁不开眼睛的小猫咪，来自梦的边缘。它告诉你：不必每时每刻都充满能量，困了就睡，休息也是前进的一部分。' },
            { id: 'fox',      name: '绿光灵狐',    filename: '绿光灵狐.png',    animation: 'sway',   color: '#4DB87A', emoji: '🦊', personality: '智慧引路人',      story: '穿梭于现实与梦境边界的灵狐，双眼闪烁着古老的绿光。它看过太多迷失方向的灵魂，学会了用最温柔的方式点亮你心里那盏被遗忘的灯。' },
            { id: 'hedgehog', name: '暖光刺猬',    filename: '暖光刺猬.png',    animation: 'breathe', color: '#D4894A', emoji: '🦔', personality: '柔软的心',        story: '浑身是刺的小刺猬，却有一颗最柔软的心。它教会你：可以保护自己，也可以敞开心扉——刺是铠甲，爱是本能。' },
            { id: 'corgi',    name: '漂浮柯基',    filename: '漂浮柯基.png',    animation: 'float',  color: '#F5A623', emoji: '🐶', personality: '快乐制造机',      story: '永远飘在空中的小柯基，因为太快乐了所以脚都不需要沾地。它的使命就是让你嘴角上扬，让快乐变得简单。' },
            { id: 'otter',    name: '水波水獭',    filename: '水波水獭.png',    animation: 'float',  color: '#5CB8D4', emoji: '🦦', personality: '情绪调色盘',      story: '来自情绪之湖的小水獭，能感知每一滴水的情绪。它不评判任何感受，只是静静陪伴你趟过焦虑、愤怒、悲伤，最后一起看见湖面的光。' },
            { id: 'elephant', name: '水晶小象',    filename: '水晶小象.png',    animation: 'sway',   color: '#8B9EC9', emoji: '🐘', personality: '记忆收藏家',      story: '透明如水晶的小象，记忆中装满了所有被遗忘的美好瞬间。当你在黑暗中找不到自己时，它会用那些碎片帮你拼出完整的画面。' },
            { id: 'whale',    name: '星海鲸鱼',    filename: '星海鲸鱼.png',    animation: 'float',  color: '#4A90D9', emoji: '🐋', personality: '宇宙级陪伴',      story: '在意识宇宙中遨游的蓝鲸，见过无数星系的诞生与消亡。它告诉你：在这个浩瀚宇宙中，你是独特而珍贵的存在。' },
            { id: 'penguin',  name: '音乐企鹅',    filename: '音乐企鹅.png',    animation: 'bounce', color: '#5BC8C8', emoji: '🐧', personality: '节奏疗愈师',      story: '来自冰川深处的企鹅，会唱一种古老的心跳之歌。它知道，音乐是灵魂的语言——当言语无法抵达的地方，旋律可以。' },
            { id: 'sheep',    name: '云朵小羊',    filename: '云朵小羊.png',    animation: 'float',  color: '#B8D4E8', emoji: '🐑', personality: '天空幻想家',      story: '在云端草地漫步的小羊，背上背着整个天空的梦。它知道，幻想不是逃避，而是灵魂在舞蹈——偶尔飞一飞，是为了更好地落地。' },
            { id: 'panda',    name: '竹林熊猫',    filename: '竹林熊猫.png',    animation: 'breathe', color: '#7DB87D', emoji: '🐼', personality: '竹林隐士',        story: '住在竹林深处的隐士熊猫，看似懒洋洋实则通透。它说：最好的修行不是苦行僧式的坚持，而是学会在该放下时放下，在该慢时慢下来。' }
        ];
        
        let selectedCompanion = null;
        let tempSelected = null; // 临时选择（未保存）
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', () => {
            loadCurrentCompanion();
            renderCompanionGrid();
            
            // 检查是否有已保存的伙伴
            const saved = localStorage.getItem('xinqing_companion');
            if (saved) {
                const companion = companions.find(c => c.id === saved);
                if (companion) {
                    showCurrentCompanionHint(companion);
                }
            }
        });
        
        // 加载当前伙伴
        function loadCurrentCompanion() {
            const saved = localStorage.getItem('xinqing_companion');
            if (saved) {
                selectedCompanion = companions.find(c => c.id === saved);
                tempSelected = selectedCompanion;
                // 默认选中已保存的伙伴
                setTimeout(() => {
                    const card = document.querySelector(`[data-companion-id="${saved}"]`);
                    if (card) card.classList.add('selected');
                    updatePreview(tempSelected);
                }, 100);
            }
        }
        
        // 渲染动物选择网格
        function renderCompanionGrid() {
            const grid = document.getElementById('companionGrid');
            grid.innerHTML = companions.map((c, index) => `
                <div class="companion-card relative bg-white rounded-2xl p-4 border-2 border-transparent shadow-sm" 
                     data-companion-id="${c.id}"
                     onclick="selectCompanion('${c.id}')"
                     style="--stagger-index: ${index}">
                    <div class="aspect-square rounded-xl overflow-hidden mb-3 bg-gradient-to-br from-${getGradientColor(c.color)} to-${getGradientColorEnd(c.color)} p-4 flex items-center justify-center">
                        <img src="images/companions/${c.filename}" 
                             alt="${c.name}" 
                             class="w-full h-full object-contain companion-${c.animation}"
                             onerror="this.parentElement.innerHTML='<span class=\\'text-5xl\\'>${c.emoji}</span>'">
                    </div>
                    <h3 class="font-semibold text-gray-800 text-center mb-1">${c.name}</h3>
                    <p class="text-xs text-gray-500 text-center">${c.personality}</p>
                </div>
            `).join('');
        }
        
        // 获取渐变色类名（支持新12个动物颜色）
        function getGradientColor(hex) {
            const colors = {
                '#E879A9': 'pink-100',
                '#E8A838': 'amber-100',
                '#9B8EC4': 'purple-100',
                '#4DB87A': 'green-100',
                '#D4894A': 'orange-100',
                '#F5A623': 'amber-100',
                '#5CB8D4': 'cyan-100',
                '#8B9EC9': 'indigo-100',
                '#4A90D9': 'blue-100',
                '#5BC8C8': 'teal-100',
                '#B8D4E8': 'sky-100',
                '#7DB87D': 'green-100',
                // 旧颜色（兼容）
                '#5DADE2': 'blue-100',
                '#85C1E9': 'sky-100',
                '#E67E22': 'orange-100',
                '#82E0AA': 'green-100',
                '#F5B7B1': 'pink-100',
                '#D7DBDD': 'gray-100'
            };
            return colors[hex] || 'gray-100';
        }
        function getGradientColorEnd(hex) {
            const colors = {
                '#E879A9': 'pink-200',
                '#E8A838': 'amber-200',
                '#9B8EC4': 'purple-200',
                '#4DB87A': 'green-200',
                '#D4894A': 'orange-200',
                '#F5A623': 'amber-200',
                '#5CB8D4': 'cyan-200',
                '#8B9EC9': 'indigo-200',
                '#4A90D9': 'blue-200',
                '#5BC8C8': 'teal-200',
                '#B8D4E8': 'sky-200',
                '#7DB87D': 'green-200',
                // 旧颜色（兼容）
                '#5DADE2': 'blue-200',
                '#85C1E9': 'sky-200',
                '#E67E22': 'orange-200',
                '#82E0AA': 'green-200',
                '#F5B7B1': 'pink-200',
                '#D7DBDD': 'gray-200'
            };
            return colors[hex] || 'gray-200';
        }
        
        // 选择动物
        function selectCompanion(id) {
            // 移除其他选中状态
            document.querySelectorAll('.companion-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            // 添加选中状态
            const card = document.querySelector(`[data-companion-id="${id}"]`);
            card.classList.add('selected');
            
            // 更新临时选择
            tempSelected = companions.find(c => c.id === id);
            
            // 更新预览
            updatePreview(tempSelected);
            
            // 添加心动效果
            addHeartEffect();
        }
        
        // 更新预览
        function updatePreview(companion) {
            const preview = document.getElementById('previewCompanion');
            if (!companion) {
                preview.innerHTML = `
                    <div class="text-center text-gray-400">
                        <svg class="w-16 h-16 mx-auto mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                        </svg>
                        <p>选择一个伙伴</p>
                    </div>
                `;
                return;
            }
            
            preview.innerHTML = `
                <img src="images/companions/${companion.filename}" 
                     alt="${companion.name}" 
                     class="w-40 h-40 sm:w-48 sm:h-48 object-contain companion-${companion.animation}"
                     onerror="this.parentElement.innerHTML='<span class=\\'text-8xl companion-${companion.animation}\\">${companion.emoji}</span>'">
            `;
            
            // 添加星星装饰
            addSparkles();
        }
        
        // 添加星星装饰
        function addSparkles() {
            const stage = document.getElementById('previewStage');
            for (let i = 0; i < 5; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = `${20 + Math.random() * 60}%`;
                sparkle.style.top = `${20 + Math.random() * 60}%`;
                sparkle.style.animationDelay = `${Math.random() * 1.5}s`;
                sparkle.style.background = ['#ffd700', '#ff69b4', '#87ceeb', '#98fb98'][Math.floor(Math.random() * 4)];
                stage.appendChild(sparkle);
            }
        }
        
        // 心动效果
        function addHeartEffect() {
            const stage = document.getElementById('previewStage');
            const hearts = ['💕', '💗', '💖', '✨', '💫'];
            for (let i = 0; i < 3; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-effect';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = `${30 + Math.random() * 40}%`;
                heart.style.top = `${40 + Math.random() * 20}%`;
                heart.style.animationDelay = `${i * 0.2}s`;
                stage.appendChild(heart);
                setTimeout(() => heart.remove(), 1000);
            }
        }
        
        // 保存选择
        function saveCompanion() {
            if (!tempSelected) {
                showToast('请先选择一个伙伴', 'warning');
                return;
            }
            
            localStorage.setItem('xinqing_companion', tempSelected.id);
            showToast(`${tempSelected.name} 已成为你的专属伙伴！`, 'success');
            showCurrentCompanionHint(tempSelected);
            
            // 添加保存成功动画
            const btn = document.querySelector('.btn-primary');
            btn.classList.add('scale-110');
            setTimeout(() => btn.classList.remove('scale-110'), 300);
        }
        
        // 显示当前伙伴提示
        function showCurrentCompanionHint(companion) {
            const hint = document.getElementById('currentCompanionHint');
            const thumb = document.getElementById('currentCompanionThumb');
            const name = document.getElementById('currentCompanionName');
            
            hint.classList.remove('hidden');
            thumb.innerHTML = `<img src="images/companions/${companion.filename}" alt="${companion.name}" class="w-full h-full object-contain" onerror="this.parentElement.innerHTML='<span class=\\'text-3xl flex items-center justify-center h-full\\'>${companion.emoji}</span>'">`;
            name.textContent = companion.name;
        }
        
        // 清除伙伴
        function clearCompanion() {
            localStorage.removeItem('xinqing_companion');
            selectedCompanion = null;
            tempSelected = null;
            
            // 移除选中状态
            document.querySelectorAll('.companion-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            // 清空预览
            updatePreview(null);
            
            // 隐藏提示
            document.getElementById('currentCompanionHint').classList.add('hidden');
            
            showToast('已取消伙伴陪伴', 'info');
        }
        
        // Toast 提示
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toast.className = 'fixed top-20 left-1/2 transform -translate-x-1/2 px-6 py-3 text-white rounded-full shadow-lg transition-opacity duration-300 pointer-events-none z-50';
            
            const colors = {
                success: 'bg-primary-500',
                warning: 'bg-yellow-500',
                error: 'bg-red-500',
                info: 'bg-blue-500'
            };
            
            toast.classList.add(colors[type] || colors.info);
            toastMessage.textContent = message;
            toast.style.opacity = '1';
            
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2500);
        }
        
        // 移动端菜单
        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.classList.toggle('hidden');
        }
        
        // 页面加载动画
        NeuroAesthetics.initStaggerAnimations();
    </script>
</body>
</html>
