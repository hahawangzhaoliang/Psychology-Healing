<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理知识图谱 - 心晴空间</title>
    <meta name="description" content="基于认知行为疗法和积极心理学的可视化知识图谱">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0faf7',
                            100: '#d9f2eb',
                            200: '#b5ddd3',
                            300: '#8ac4b5',
                            400: '#7CB8A8',
                            500: '#5A9A8A',
                            600: '#4a8a7a',
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: 'Nunito Sans', 'PingFang SC', sans-serif; }
        .node { cursor: pointer; transition: all 0.3s ease; }
        .node:hover { filter: brightness(1.1); }
        .node-label { font-size: 12px; font-weight: 600; pointer-events: none; }
        .link { stroke-opacity: 0.6; }
        #graph-container { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
        .detail-panel { transition: transform 0.3s ease; }
        .detail-panel.hidden { transform: translateX(100%); }
    </style>
</head>
<body class="bg-gray-50 text-gray-700 min-h-screen">
    <nav class="bg-white shadow-sm fixed top-0 left-0 right-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <a href="index.html" class="text-2xl font-bold text-primary-500">心晴空间</a>
                <div class="flex items-center gap-4">
                    <span class="text-gray-600">心理知识图谱</span>
                    <a href="index.html" class="text-gray-600 hover:text-primary-500 transition">返回首页</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="pt-16 flex h-screen">
        <div class="flex-1 relative">
            <div id="graph-container" class="w-full h-full"></div>
            
            <div class="absolute top-4 left-4 bg-white rounded-lg shadow-lg p-4">
                <h3 class="text-sm font-semibold text-gray-700 mb-3">图例</h3>
                <div class="space-y-2">
                    <div class="flex items-center gap-2">
                        <div class="w-4 h-4 rounded-full" style="background: #5A9A8A"></div>
                        <span class="text-xs text-gray-600">治疗方法</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-4 h-4 rounded-full" style="background: #6B9BD1"></div>
                        <span class="text-xs text-gray-600">核心概念</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-4 h-4 rounded-full" style="background: #7DD3C0"></div>
                        <span class="text-xs text-gray-600">实践技术</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-4 h-4 rounded-full" style="background: #E8B87D"></div>
                        <span class="text-xs text-gray-600">评估工具</span>
                    </div>
                </div>
                <div class="mt-4 pt-3 border-t border-gray-200">
                    <p class="text-xs text-gray-500">点击节点查看详情</p>
                    <p class="text-xs text-gray-500">拖拽节点调整位置</p>
                </div>
            </div>
        </div>

        <div id="detail-panel" class="detail-panel hidden w-96 bg-white shadow-xl overflow-y-auto">
            <div class="p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 id="detail-title" class="text-2xl font-bold text-gray-800"></h2>
                    <button onclick="closeDetailPanel()" class="text-gray-400 hover:text-gray-600">✕</button>
                </div>
                <div id="detail-category" class="mb-4"></div>
                <div class="space-y-4">
                    <div>
                        <h3 class="text-sm font-semibold text-gray-500 mb-2">概述</h3>
                        <p id="detail-description" class="text-gray-700 leading-relaxed"></p>
                    </div>
                    <div id="detail-reference-section" class="hidden">
                        <h3 class="text-sm font-semibold text-gray-500 mb-2">科学依据</h3>
                        <p id="detail-reference" class="text-xs text-gray-600 italic"></p>
                    </div>
                    <div id="detail-evidence-section" class="hidden">
                        <h3 class="text-sm font-semibold text-gray-500 mb-2">研究证据</h3>
                        <p id="detail-evidence" class="text-sm text-gray-700"></p>
                    </div>
                    <div id="detail-practices-section" class="hidden">
                        <h3 class="text-sm font-semibold text-gray-500 mb-2">实践方法</h3>
                        <div id="detail-practices" class="space-y-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/knowledge-graph.js"></script>
</body>
</html>
