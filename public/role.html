    <script>
        // 状态管理
        let selectedRoles = [];
        let currentStep = 1;

        // 角色信息
        const roleInfo = {
            child: { name: '子女', category: '家庭', emoji: '👨‍👩‍👧' },
            partner: { name: '伴侣', category: '家庭', emoji: '💑' },
            parent: { name: '父母', category: '家庭', emoji: '👶' },
            sibling: { name: '兄弟姐妹', category: '家庭', emoji: '👨‍👩‍👧‍👦' },
            student: { name: '学生', category: '社会', emoji: '📚' },
            employee: { name: '职场人', category: '社会', emoji: '💼' },
            freelancer: { name: '自由职业者', category: '社会', emoji: '💻' },
            entrepreneur: { name: '创业者', category: '社会', emoji: '🚀' },
            learner: { name: '学习者', category: '自我', emoji: '📖' },
            creator: { name: '创造者', category: '自我', emoji: '🎨' },
            volunteer: { name: '志愿者', category: '自我', emoji: '🤝' },
            explorer: { name: '探索者', category: '自我', emoji: '🌟' }
        };

        // 角色冲突定义
        const conflicts = {
            'employee-learner': {
                roles: ['职场人', '学习者'],
                description: '工作与学习的平衡',
                suggestion: '设定固定学习时间，利用碎片化时间学习'
            },
            'employee-creator': {
                roles: ['职场人', '创造者'],
                description: '工作与兴趣爱好的冲突',
                suggestion: '下班后留出1小时做自己喜欢的事，周末安排创作时间'
            },
            'employee-explorer': {
                roles: ['职场人', '探索者'],
                description: '工作与自我探索的矛盾',
                suggestion: '定期反思，设定个人成长目标'
            },
            'student-employee': {
                roles: ['学生', '职场人'],
                description: '学业与工作的双重压力',
                suggestion: '合理规划时间，优先处理重要任务'
            },
            'parent-employee': {
                roles: ['父母', '职场人'],
                description: '育儿与工作的平衡',
                suggestion: '设定工作边界，保证家庭时间'
            },
            'partner-employee': {
                roles: ['伴侣', '职场人'],
                description: '亲密关系与工作的冲突',
                suggestion: '每天留出专属时间给伴侣，周末约会'
            },
            'child-employee': {
                roles: ['子女', '职场人'],
                description: '家庭责任与工作的矛盾',
                suggestion: '定期与父母沟通，平衡家庭和工作需求'
            }
        };

        // 切换角色选择
        function toggleRole(card, role) {
            if (selectedRoles.includes(role)) {
                selectedRoles = selectedRoles.filter(r => r !== role);
                card.classList.remove('selected');
                card.querySelector('.check-icon').classList.add('hidden');
            } else {
                selectedRoles.push(role);
                card.classList.add('selected');
                card.querySelector('.check-icon').classList.remove('hidden');
            }
        }

        // 下一步
        function nextStep(step) {
            if (step === 2 && selectedRoles.length === 0) {
                alert('请至少选择一个角色');
                return;
            }

            currentStep = step;
            
            // 更新进度指示器
            for (let i = 1; i <= 3; i++) {
                const indicator = document.getElementById(`step-${i}`);
                if (i < step) {
                    indicator.classList.add('completed');
                    indicator.classList.remove('active');
                } else if (i === step) {
                    indicator.classList.add('active');
                    indicator.classList.remove('completed');
                } else {
                    indicator.classList.remove('active', 'completed');
                }
            }

            // 显示对应内容
            document.querySelectorAll('[id^="step-"][id$="-content"]').forEach(el => {
                el.classList.add('hidden');
            });
            document.getElementById(`step-${step}-content`).classList.remove('hidden');

            // 生成对应内容
            if (step === 2) {
                generateConflictAnalysis();
            } else if (step === 3) {
                generateBalanceSuggestions();
            }
        }

        // 上一步
        function prevStep(step) {
            currentStep = step;
            
            // 更新进度指示器
            for (let i = 1; i <= 3; i++) {
                const indicator = document.getElementById(`step-${i}`);
                if (i < step) {
                    indicator.classList.add('completed');
                    indicator.classList.remove('active');
                } else if (i === step) {
                    indicator.classList.add('active');
                    indicator.classList.remove('completed');
                } else {
                    indicator.classList.remove('active', 'completed');
                }
            }

            // 显示对应内容
            document.querySelectorAll('[id^="step-"][id$="-content"]').forEach(el => {
                el.classList.add('hidden');
            });
            document.getElementById(`step-${step}-content`).classList.remove('hidden');
        }

        // 生成冲突分析
        function generateConflictAnalysis() {
            const container = document.getElementById('conflict-analysis');
            let html = '';

            // 检查角色冲突
            const foundConflicts = [];
            selectedRoles.forEach((role1, i) => {
                selectedRoles.slice(i + 1).forEach(role2 => {
                    const conflictKey1 = `${role1}-${role2}`;
                    const conflictKey2 = `${role2}-${role1}`;
                    
                    if (conflicts[conflictKey1]) {
                        foundConflicts.push({ key: conflictKey1, ...conflicts[conflictKey1] });
                    } else if (conflicts[conflictKey2]) {
                        foundConflicts.push({ key: conflictKey2, ...conflicts[conflictKey2] });
                    }
                });
            });

            if (foundConflicts.length === 0) {
                html = `
                    <div class="text-center py-8">
                        <div class="text-6xl mb-4">✨</div>
                        <h3 class="text-xl font-semibold text-gray-800 mb-2">太棒了！</h3>
                        <p class="text-gray-600">你的角色之间没有明显的冲突</p>
                    </div>
                `;
            } else {
                foundConflicts.forEach(conflict => {
                    html += `
                        <div class="border-l-4 border-primary-500 pl-6 py-2">
                            <h3 class="text-lg font-semibold text-gray-800 mb-2">${conflict.roles[0]} vs ${conflict.roles[1]}</h3>
                            <p class="text-gray-600 mb-2">${conflict.description}</p>
                            <p class="text-sm text-primary-600">${conflict.suggestion}</p>
                        </div>
                    `;
                });
            }

            // 显示角色地图
            html += `
                <div class="mt-8 pt-6 border-t border-gray-200">
                    <h3 class="text-lg font-semibold text-gray-700 mb-4">你的角色地图</h3>
                    <div class="flex flex-wrap gap-3">
                        ${selectedRoles.map(role => `
                            <div class="bg-primary-50 px-4 py-2 rounded-full">
                                <span class="mr-2">${roleInfo[role].emoji}</span>
                                <span class="text-gray-700">${roleInfo[role].name}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            container.innerHTML = html;
        }

        // 生成平衡建议
        function generateBalanceSuggestions() {

        // 保存并完成
        function saveAndFinish() {
            // 保存到本地存储
            localStorage.setItem('userRoles', JSON.stringify(selectedRoles));
            
            alert('角色探索完成！我们会根据你的角色提供个性化的内容推荐。');
            
            // 跳转到首页
            window.location.href = 'index.html';
        }
    </script>
