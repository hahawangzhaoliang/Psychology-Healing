    <link rel="stylesheet" href="css/neuroaesthetics.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0faf7',
                            100: '#d9f2eb',
                            200: '#b5ddd3',
                            300: '#8ac4b5',
                            400: '#7CB8A8',
                            500: '#5A9A8A',
                            600: '#4a8a7a',
                        },
                        warm: {
                            50: '#fdfbf9',
                            100: '#F5E6D3',
                            200: '#E8D5C4',
                            300: '#d4c4b0',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-warm-50 text-gray-700 min-h-screen neuro-aesthetic-body">

    <!-- 导航栏 -->
    <nav class="navbar" id="mainNav">
        <div class="max-w-6xl mx-auto px-4 sm:px-6">
            <div class="flex items-center justify-between h-16">
                <a href="index.html" class="flex items-center space-x-2 group">
                    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-primary-400 to-primary-500 flex items-center justify-center shadow-md group-hover:shadow-lg transition-shadow">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                        </svg>
                    </div>
                    <span class="font-semibold text-gray-800 group-hover:text-primary-500 transition-colors">心晴空间</span>
                </a>
                
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="nav-link">首页</a>
                    <a href="emotion.html" class="nav-link">情绪觉察</a>
                    <a href="article.html" class="nav-link active">疗愈内容</a>
                    <a href="relax.html" class="nav-link">放松练习</a>

                <button onclick="toggleMobileMenu()" class="md:hidden p-2 text-gray-600" aria-label="菜单" data-touch-feedback>
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div id="mobileMenu" class="hidden md:hidden bg-white border-t border-gray-100 mobile-menu">
            <div class="px-4 py-3 space-y-1">
                <a href="index.html" class="mobile-nav-link">首页</a>
                <a href="emotion.html" class="mobile-nav-link">情绪觉察</a>
                <a href="article.html" class="mobile-nav-link active">疗愈内容</a>
                <a href="relax.html" class="mobile-nav-link">放松练习</a>
                <a href="about.html" class="mobile-nav-link">关于我们</a>
                <a href="companion.html" class="mobile-nav-link">我的伙伴</a>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="pt-16">
        <!-- 页面标题 -->
        <section class="hero-gradient py-14">
            <div class="max-w-6xl mx-auto px-4 sm:px-6 text-center stagger-child" style="--stagger-index: 0">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white/80 shadow-sm mb-4">
                    <svg class="w-8 h-8 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                    </svg>
                </div>
                <h1 class="text-2xl sm:text-3xl font-bold text-gray-800 mb-3">疗愈内容</h1>
                <p class="text-gray-600 max-w-xl mx-auto">轻量心理科普，用易懂的方式了解自己，学习照顾内心的方法。</p>
            </div>
        </section>

        <!-- 文章列表 -->
        <section class="py-10">
            <div class="max-w-6xl mx-auto px-4 sm:px-6">
                <!-- 分类标签 -->
                <div class="category-tabs stagger-child mb-8" style="--stagger-index: 1" role="tablist">
                    <button onclick="filterArticles('all')" class="category-tab active" data-category="all" role="tab" aria-selected="true">
                        全部
                    </button>
                    <button onclick="filterArticles('神经科学')" class="category-tab" data-category="神经科学" role="tab" aria-selected="false">
                        神经科学
                    </button>
                    <button onclick="filterArticles('临床心理')" class="category-tab" data-category="临床心理" role="tab" aria-selected="false">
                        临床心理
                    </button>
                    <button onclick="filterArticles('心理科学')" class="category-tab" data-category="心理科学" role="tab" aria-selected="false">
                        心理科学
                    </button>
                    <button onclick="filterArticles('睡眠心理')" class="category-tab" data-category="睡眠心理" role="tab" aria-selected="false">
                        睡眠心理
                    </button>
                    <button onclick="filterArticles('压力管理')" class="category-tab" data-category="压力管理" role="tab" aria-selected="false">
                        压力管理
                    </button>
                    <button onclick="filterArticles('积极心理')" class="category-tab" data-category="积极心理" role="tab" aria-selected="false">
                        积极心理
                    </button>
                </div>

                <!-- 加载状态 -->
                <div id="loadingState" class="loading-container">
                    <div class="loading-spinner"></div>
                    <p class="loading-text">正在加载内容...</p>
                </div>

                <!-- 文章卡片容器 -->
                <div id="articleList" class="article-grid hidden" role="tabpanel"></div>

                <!-- 空状态 -->
                <div id="emptyState" class="empty-state hidden">
                    <div class="empty-icon">
                        <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                    </div>
                    <h3 class="empty-title">暂无相关内容</h3>
                    <p class="empty-text">试试其他分类吧</p>
                </div>
            </div>
        </section>
    </main>

    <!-- 文章详情弹窗 -->
    <div id="articleModal" class="modal-overlay hidden" aria-hidden="true">
        <div class="modal-container article-modal" role="dialog" aria-modal="true">
            <div class="modal-header">
                <div>
                    <span id="modalCategory" class="modal-category"></span>
                    <h2 id="modalTitle" class="modal-title">文章标题</h2>
                </div>
                <button onclick="closeArticle()" class="modal-close-btn" aria-label="关闭" data-touch-feedback>
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div id="modalContent" class="modal-content article-content"></div>
            <div class="modal-footer">
                <button onclick="closeArticle()" class="btn-primary" data-touch-feedback>我知道了</button>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="max-w-6xl mx-auto px-4 sm:px-6">
            <div class="footer-disclaimer">
                <svg class="w-5 h-5 text-primary-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <p>本平台为公益性质的心理健康科普与情绪陪伴服务平台，不提供任何形式的医学诊断、心理疾病诊断或精神疾病诊断服务。如有严重心理困扰，请及时前往正规医疗机构就诊。</p>
            </div>
            <p class="footer-copyright">© 2024 心晴空间 · 公益心理疗愈平台</p>
        </div>
    </footer>

    <script src="js/neuroaesthetics.js"></script>
    <script src="js/companion-widget.js"></script>
    <script>
        let allKnowledge = [];
        let currentFilter = 'all';

        const categoryColors = {
            '神经科学': { bg: '#f3e8ff', text: '#7c3aed', gradient: 'linear-gradient(135deg, #f3e8ff 0%, #e9d5ff 100%)' },
            '临床心理': { bg: '#dbeafe', text: '#3b82f6', gradient: 'linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%)' },
            '心理科学': { bg: '#d9f2eb', text: '#5A9A8A', gradient: 'linear-gradient(135deg, #d9f2eb 0%, #b5ddd3 100%)' },
            '睡眠心理': { bg: '#e0e7ff', text: '#6366f1', gradient: 'linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%)' },
            '压力管理': { bg: '#fef3c7', text: '#f59e0b', gradient: 'linear-gradient(135deg, #fef3c7 0%, #fde68a 100%)' },
            '积极心理': { bg: '#d1fae5', text: '#059669', gradient: 'linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%)' },
            'default': { bg: '#d9f2eb', text: '#5A9A8A', gradient: 'linear-gradient(135deg, #d9f2eb 0%, #b5ddd3 100%)' }
        };

        function showToast(message, type = 'info') {
            const colors = {
                success: 'var(--color-primary-400)',
                info: 'var(--color-blue-400)',
                warning: 'var(--color-accent-orange)',
                error: 'var(--color-accent-coral)'
            };
            const toast = document.createElement('div');
            toast.style.cssText = `position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:${colors[type] || colors.info};color:white;padding:0.875rem 1.5rem;border-radius:9999px;font-weight:500;z-index:10000;opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);box-shadow:var(--shadow-lg);`;
            toast.textContent = message;
            document.body.appendChild(toast);
            requestAnimationFrame(() => { toast.style.opacity='1'; toast.style.transform='translateX(-50%) translateY(0)'; });
            setTimeout(() => { toast.style.opacity='0'; toast.style.transform='translateX(-50%) translateY(-10px)'; setTimeout(() => toast.remove(), 300); }, 2500);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadKnowledge();
            NeuroAesthetics.initStaggerAnimations();
            NeuroAesthetics.initNavbarScroll('mainNav');
        });

        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.classList.toggle('hidden');
            if (!menu.classList.contains('hidden')) menu.style.animation = 'fadeInDown 0.2s ease-out';
        }

        async function loadKnowledge() {
            try {
                // 从 API 读取（Vercel Blob 存储）
                const response = await fetch('/api/knowledge/psychology?limit=100');
                const data = await response.json();
                if (data.knowledge && data.knowledge.length > 0) {
                    allKnowledge = data.knowledge;
                } else {
                    allKnowledge = getSampleArticles();
                }
            } catch {
                allKnowledge = getSampleArticles();
            }
            renderArticles(allKnowledge);
        }

        function getSampleArticles() {
            return [
                { id: 1, title: '为什么我们会感到焦虑？', category: '神经科学', content: '焦虑是大脑的一种保护机制。当我们感知到潜在的威胁时，大脑的杏仁核会被激活，触发"战或逃"反应。现代生活中，工作压力、人际关系、经济担忧等因素都可能触发焦虑反应。\n\n了解焦虑的生理机制可以帮助我们更好地应对。当我们感到焦虑时，可以尝试深呼吸、渐进式肌肉放松等方法来平复神经系统。', keyPoints: ['焦虑是正常的情绪反应', '深呼吸可以激活副交感神经', '认知重构有助于减轻焦虑'], tags: ['焦虑', '神经科学', '自我调节'], source: '心晴空间' },
                { id: 2, title: '正念冥想：找回内心的平静', category: '心理科学', content: '正念冥想是一种专注于当下的练习，它帮助我们从纷乱的思绪中抽离，观察自己的内心世界。\n\n研究表明，8周的正念练习可以显著降低皮质醇（压力激素）水平，改善情绪调节能力。每天只需要10-15分钟，就能带来积极的变化。', keyPoints: ['正念可以改变大脑结构', '从5分钟开始更容易坚持', '关注呼吸是最基础的练习'], tags: ['正念', '冥想', '放松'], source: '心晴空间' },
                { id: 3, title: '睡眠与心理健康的关系', category: '睡眠心理', content: '睡眠不仅是身体的休息时间，更是大脑整理记忆、清除代谢废物的关键时期。失眠和睡眠质量差会显著增加焦虑和抑郁的风险。\n\n良好的睡眠卫生习惯包括：固定作息时间、睡前避免蓝光、保持卧室凉爽黑暗、限制咖啡因摄入等。', keyPoints: ['成年人需要7-9小时睡眠', '睡眠债会累积', '规律作息是健康睡眠的基础'], tags: ['睡眠', '心理健康', '生活方式'], source: '心晴空间' },
                { id: 4, title: '如何建立健康的情绪边界', category: '压力管理', content: '情绪边界是指我们在心理上为自己划定的保护线，它帮助我们区分自己的情绪和他人的情绪，保护自己的心理空间。\n\n设立健康的边界并不意味着冷漠，而是对自己和他人的尊重。学会说"不"，是建立边界的重要一步。', keyPoints: ['明确自己的底线', '学会表达真实需求', '边界是为了保护关系'], tags: ['边界', '人际关系', '自我成长'], source: '心晴空间' },
                { id: 5, title: '感恩的力量：科学视角', category: '积极心理', content: '感恩不仅仅是一种礼貌，它对心理健康有着深远的影响。研究表明，经常表达感恩的人更快乐、更乐观、抑郁和焦虑水平更低。\n\n感恩日记是一种简单有效的方法：每天写下3件让你感激的事情，即使是生活中的小事。', keyPoints: ['感恩改变大脑奖赏系统', '关注积极面减少负面偏差', '关系满意度显著提升'], tags: ['感恩', '幸福感', '积极心理学'], source: '心晴空间' },
                { id: 6, title: '认知行为疗法入门', category: '临床心理', content: '认知行为疗法（CBT）是目前证据最充分的心理治疗方法之一。它的核心原理是：我们的想法影响情绪和行为，改变不健康的思维模式可以改善心理状态。\n\n常见的认知扭曲包括：非黑即白的思维、以偏概全、读心术、灾难化思维等。识别这些模式是改变的第一步。', keyPoints: ['想法不等于事实', '情绪是暂时的', '小改变带来大影响'], tags: ['CBT', '认知扭曲', '治疗方法'], source: '心晴空间' }
            ];
        }

        function renderArticles(articles) {
            const container = document.getElementById('articleList');
            const loadingState = document.getElementById('loadingState');
            const emptyState = document.getElementById('emptyState');

            loadingState.classList.add('hidden');
            if (!articles || articles.length === 0) {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            container.classList.remove('hidden');

            container.innerHTML = articles.map((article, index) => {
                const colors = categoryColors[article.category] || categoryColors['default'];
                return `<article class="article-card" data-category="${article.category}" style="--card-index: ${index}">
                    <div class="article-card-header" style="background: ${colors.gradient}">
                        <span class="article-category-badge" style="background: ${colors.bg}; color: ${colors.text}">${article.category || '心理科普'}</span>
                    </div>
                    <div class="article-card-body">
                        <h3 class="article-card-title">${article.title}</h3>
                        <p class="article-card-excerpt">${(article.content || '').substring(0, 100)}...</p>
                        <button onclick='showArticle(${JSON.stringify(article).replace(/'/g, "\\'")})' class="article-read-more" data-touch-feedback>
                            阅读全文
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </button>
                    </div>
                </article>`;
            }).join('');

            requestAnimationFrame(() => {
                container.querySelectorAll('.article-card').forEach((card, i) => {
                    setTimeout(() => card.classList.add('visible'), i * 80);
                });
            });
        }

        function filterArticles(category) {
            currentFilter = category;
            document.querySelectorAll('.category-tab').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.category === category) { btn.classList.add('active'); btn.setAttribute('aria-selected', 'true'); }
                else { btn.setAttribute('aria-selected', 'false'); }
            });
            if (category === 'all') renderArticles(allKnowledge);
            else renderArticles(allKnowledge.filter(a => a.category === category));
        }

        function showArticle(article) {
            const modal = document.getElementById('articleModal');
            const colors = categoryColors[article.category] || categoryColors['default'];
            document.getElementById('modalTitle').textContent = article.title;
            document.getElementById('modalCategory').textContent = article.category || '心理科普';
            document.getElementById('modalCategory').style.cssText = `background:${colors.bg};color:${colors.text};display:inline-block;padding:0.25rem 0.625rem;border-radius:9999px;font-size:0.75rem;font-weight:600;margin-bottom:0.5rem;`;
            
            let html = `<p style="margin-bottom:1rem">${(article.content || '').replace(/\n/g, '</p><p style="margin-bottom:1rem">')}</p>`;
            if (article.keyPoints && article.keyPoints.length > 0) {
                html += `<div style="background:var(--color-primary-50);border-radius:var(--radius-lg);padding:1.25rem;margin:1.5rem 0">
                    <h3 style="display:flex;align-items:center;gap:0.5rem;font-size:1rem;font-weight:700;color:var(--color-primary-600);margin-bottom:0.75rem">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                        核心要点
                    </h3>
                    <ul style="list-style:none;padding:0;margin:0">${article.keyPoints.map(p => `<li style="position:relative;padding-left:1.5rem;margin-bottom:0.5rem"><span style="position:absolute;left:0;color:var(--color-primary-500);font-weight:700">✓</span>${p}</li>`).join('')}</ul>
                </div>`;
            }
            if (article.tags && article.tags.length > 0) {
                html += `<div style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:1.5rem">${article.tags.map(t => `<span style="display:inline-block;padding:0.25rem 0.625rem;background:var(--color-gray-100);border-radius:9999px;font-size:0.75rem;color:var(--color-gray-600)">${t}</span>`).join('')}</div>`;
            }
            if (article.source) html += `<p style="margin-top:1.5rem;font-size:0.75rem;color:var(--color-gray-400);font-style:italic">来源：${article.source}</p>`;
            
            document.getElementById('modalContent').innerHTML = html;
            modal.classList.remove('hidden');
            modal.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
            requestAnimationFrame(() => { modal.querySelector('.modal-container').style.transform='translateY(0)'; modal.querySelector('.modal-container').style.opacity='1'; });
        }

        function closeArticle() {
            const modal = document.getElementById('articleModal');
            const container = modal.querySelector('.modal-container');
            container.style.transform = 'translateY(20px)';
            container.style.opacity = '0';
            setTimeout(() => { modal.classList.add('hidden'); modal.setAttribute('aria-hidden', 'true'); document.body.style.overflow = ''; container.style.transform=''; container.style.opacity=''; }, 200);
        }

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeArticle(); });
    </script>

    <style>
        .neuro-aesthetic-body { animation: fadeIn 0.5s var(--ease-out); }
        .hero-gradient { background: linear-gradient(160deg, var(--color-primary-50) 0%, var(--color-warm-50) 50%, var(--color-primary-100) 100%); }
