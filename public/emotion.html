<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情绪觉察 - 心晴空间</title>
    <meta name="description" content="记录和理解你的情绪，更好地管理它们">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0faf7',
                            100: '#d9f2eb',
                            200: '#b5ddd3',
                            300: '#8ac4b5',
                            400: '#7CB8A8',
                            500: '#5A9A8A',
                            600: '#4a8a7a',
                        },
                        warm: {
                            50: '#fdfbf9',
                            100: '#F5E6D3',
                            200: '#E8D5C4',
                            300: '#d4c4b0',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Nunito Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .emotion-btn.active {
            transform: scale(1.1);
            box-shadow: 0 0 0 3px rgba(90, 154, 138, 0.3);
        }
        .intensity-dot.active {
            background-color: #5A9A8A;
            transform: scale(1.3);
        }
    </style>
</head>
<body class="bg-warm-50 text-gray-700 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <a href="index.html" class="text-2xl font-bold text-primary-500">心晴空间</a>
                <a href="index.html" class="text-gray-600 hover:text-primary-500 transition">返回首页</a>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main class="max-w-4xl mx-auto px-4 py-12">
        <!-- 标签页切换 -->
        <div class="flex justify-center mb-8 fade-in">
            <div class="bg-white rounded-full p-1 shadow-md">
                <button onclick="switchTab('record')" id="tab-record" class="px-6 py-2 rounded-full bg-primary-500 text-white font-medium transition">
                    记录情绪
                </button>
                <button onclick="switchTab('analysis')" id="tab-analysis" class="px-6 py-2 rounded-full text-gray-600 font-medium transition hover:text-primary-500">
                    情绪分析
                </button>
                <button onclick="switchTab('suggestions')" id="tab-suggestions" class="px-6 py-2 rounded-full text-gray-600 font-medium transition hover:text-primary-500">
                    调节建议
                </button>
            </div>
        </div>

        <!-- 记录情绪 -->
        <div id="content-record" class="fade-in">
            <div class="bg-white rounded-2xl shadow-lg p-8 mb-8">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">今天感觉怎么样？</h2>
                
                <!-- 情绪选择 -->
                <div class="mb-8">
                    <p class="text-gray-600 mb-4 text-center">选择你现在的情绪</p>
                    <div class="grid grid-cols-3 md:grid-cols-6 gap-4">
                        <button onclick="selectEmotion('happy')" class="emotion-btn flex flex-col items-center p-4 rounded-xl hover:bg-primary-50 transition" data-emotion="happy">
                            <span class="text-4xl mb-2">😊</span>
                            <span class="text-sm text-gray-600">开心</span>
                        </button>
                        <button onclick="selectEmotion('calm')" class="emotion-btn flex flex-col items-center p-4 rounded-xl hover:bg-primary-50 transition" data-emotion="calm">
                            <span class="text-4xl mb-2">😌</span>
                            <span class="text-sm text-gray-600">平静</span>
                        </button>
                        <button onclick="selectEmotion('anxious')" class="emotion-btn flex flex-col items-center p-4 rounded-xl hover:bg-primary-50 transition" data-emotion="anxious">
                            <span class="text-4xl mb-2">😰</span>
                            <span class="text-sm text-gray-600">焦虑</span>
                        </button>
                        <button onclick="selectEmotion('sad')" class="emotion-btn flex flex-col items-center p-4 rounded-xl hover:bg-primary-50 transition" data-emotion="sad">
                            <span class="text-4xl mb-2">😢</span>
                            <span class="text-sm text-gray-600">难过</span>
                        </button>
                        <button onclick="selectEmotion('angry')" class="emotion-btn flex flex-col items-center p-4 rounded-xl hover:bg-primary-50 transition" data-emotion="angry">
                            <span class="text-4xl mb-2">😡</span>
                            <span class="text-sm text-gray-600">愤怒</span>
                        </button>
                        <button onclick="selectEmotion('tired')" class="emotion-btn flex flex-col items-center p-4 rounded-xl hover:bg-primary-50 transition" data-emotion="tired">
                            <span class="text-4xl mb-2">😴</span>
                            <span class="text-sm text-gray-600">疲惫</span>
                        </button>
                    </div>
                </div>

                <!-- 情绪强度 - 滑动量表 -->
                <div class="mb-8">
                    <p class="text-gray-600 mb-4 text-center">情绪温度计</p>
                    <div class="max-w-md mx-auto">
                        <div class="relative h-16 mb-4">
                            <div class="absolute inset-0 flex items-center">
                                <div class="w-full h-2 bg-gradient-to-r from-green-200 via-yellow-200 to-red-200 rounded-full"></div>
                            </div>
                            <input type="range" id="emotion-slider" min="1" max="10" value="5" 
                                   class="absolute inset-0 w-full h-2 opacity-0 cursor-pointer"
                                   oninput="updateEmotionSlider(this.value)">
                            <div id="slider-thumb" class="absolute top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-white shadow-lg flex items-center justify-center text-2xl transition-all duration-200" style="left: calc(50% - 24px)">
                                😐
                            </div>
                        </div>
                        <div class="flex justify-between text-xs text-gray-500">
                            <span>1 极好</span>
                            <span>5 平静</span>
                            <span>10 很糟糕</span>
                        </div>
                        <div class="text-center mt-3">
                            <span id="emotion-level-text" class="text-lg font-semibold" style="color: var(--theme-primary, #5A9A8A)">情绪平稳</span>
                        </div>
                    </div>
                </div>

                <!-- 情境描述 -->
                <div class="mb-8">
                    <p class="text-gray-600 mb-4">发生了什么？（可选）</p>
                    <textarea id="context" rows="3" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-400" placeholder="记录一下发生了什么，帮助你更好地理解情绪..."></textarea>
                </div>

                <!-- 标签选择 -->
                <div class="mb-8">
                    <p class="text-gray-600 mb-4">相关标签</p>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="toggleTag(this)" class="tag-btn px-4 py-2 border border-gray-200 rounded-full text-sm text-gray-600 hover:border-primary-400 hover:text-primary-500 transition" data-tag="工作">
                            工作
                        </button>
                        <button onclick="toggleTag(this)" class="tag-btn px-4 py-2 border border-gray-200 rounded-full text-sm text-gray-600 hover:border-primary-400 hover:text-primary-500 transition" data-tag="学业">
                            学业
                        </button>
                        <button onclick="toggleTag(this)" class="tag-btn px-4 py-2 border border-gray-200 rounded-full text-sm text-gray-600 hover:border-primary-400 hover:text-primary-500 transition" data-tag="人际关系">
                            人际关系
                        </button>
                        <button onclick="toggleTag(this)" class="tag-btn px-4 py-2 border border-gray-200 rounded-full text-sm text-gray-600 hover:border-primary-400 hover:text-primary-500 transition" data-tag="家庭">
                            家庭
                        </button>
                        <button onclick="toggleTag(this)" class="tag-btn px-4 py-2 border border-gray-200 rounded-full text-sm text-gray-600 hover:border-primary-400 hover:text-primary-500 transition" data-tag="健康">
                            健康
                        </button>
                        <button onclick="toggleTag(this)" class="tag-btn px-4 py-2 border border-gray-200 rounded-full text-sm text-gray-600 hover:border-primary-400 hover:text-primary-500 transition" data-tag="财务">
                            财务
                        </button>
                        <button onclick="toggleTag(this)" class="tag-btn px-4 py-2 border border-gray-200 rounded-full text-sm text-gray-600 hover:border-primary-400 hover:text-primary-500 transition" data-tag="自我">
                            自我
                        </button>
                        <button onclick="toggleTag(this)" class="tag-btn px-4 py-2 border border-gray-200 rounded-full text-sm text-gray-600 hover:border-primary-400 hover:text-primary-500 transition" data-tag="其他">
                            其他
                        </button>
                    </div>
                </div>

                <!-- 保存按钮 -->
                <button onclick="saveEmotion()" class="w-full bg-primary-500 text-white py-3 rounded-lg hover:bg-primary-600 transition font-medium">
                    保存记录
                </button>
            </div>
        </div>

        <!-- 情绪分析 -->
        <div id="content-analysis" class="hidden fade-in">
            <div class="bg-white rounded-2xl shadow-lg p-8 mb-8">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">过去7天的情绪趋势</h2>
                
                <!-- 情绪分布 -->
                <div class="mb-8">
                    <h3 class="text-lg font-semibold text-gray-700 mb-4">情绪分布</h3>
                    <div id="emotion-distribution" class="space-y-3">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <!-- 常见触发因素 -->
                <div class="mb-8">
                    <h3 class="text-lg font-semibold text-gray-700 mb-4">常见触发因素</h3>
                    <div id="trigger-factors" class="space-y-2">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <!-- 情绪趋势图 -->
                <div>
                    <h3 class="text-lg font-semibold text-gray-700 mb-4">情绪变化曲线</h3>
                    <div id="emotion-trend" class="h-64 relative">
                        <canvas id="emotion-chart"></canvas>
                    </div>
                    <div class="flex justify-center gap-4 mt-4">
                        <button onclick="loadTrendData('week')" class="px-4 py-2 rounded-full bg-primary-100 text-primary-600 text-sm font-medium">近7天</button>
                        <button onclick="loadTrendData('month')" class="px-4 py-2 rounded-full bg-gray-100 text-gray-600 text-sm font-medium">近30天</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 调节建议 -->
        <div id="content-suggestions" class="hidden fade-in">
            <div class="bg-white rounded-2xl shadow-lg p-8 mb-8">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">情绪调节建议</h2>
                
                <div id="suggestions-container" class="space-y-4">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>
    </main>

    <script>
        // 状态管理
        let selectedEmotion = null;
        let selectedIntensity = 5;
        let selectedTags = [];
        let emotionChart = null;

        // 情绪温度计相关
        const emotionLevels = {
            1: { emoji: '😊', text: '心情极好', color: '#10B981' },
            2: { emoji: '😊', text: '心情很好', color: '#34D399' },
            3: { emoji: '🙂', text: '心情不错', color: '#6EE7B7' },
            4: { emoji: '🙂', text: '比较平静', color: '#A7F3D0' },
            5: { emoji: '😐', text: '情绪平稳', color: '#FCD34D' },
            6: { emoji: '😐', text: '有点烦躁', color: '#FBBF24' },
            7: { emoji: '😕', text: '心情低落', color: '#F59E0B' },
            8: { emoji: '😕', text: '比较难过', color: '#EF4444' },
            9: { emoji: '😢', text: '心情糟糕', color: '#DC2626' },
            10: { emoji: '😢', text: '情绪很差', color: '#B91C1C' }
        };

        // 更新情绪滑动条
        function updateEmotionSlider(value) {
            const level = emotionLevels[value];
            const thumb = document.getElementById('slider-thumb');
            const text = document.getElementById('emotion-level-text');
            
            // 更新位置
            const percentage = ((value - 1) / 9) * 100;
            thumb.style.left = `calc(${percentage}% - 24px)`;
            
            // 更新表情和文字
            thumb.textContent = level.emoji;
            text.textContent = level.text;
            text.style.color = level.color;
            
            selectedIntensity = parseInt(value);
        }

        // 切换标签页
        function switchTab(tab) {
            // 隐藏所有内容
            document.querySelectorAll('[id^="content-"]').forEach(el => el.classList.add('hidden'));
            // 显示选中的内容
            document.getElementById(`content-${tab}`).classList.remove('hidden');
            
            // 更新标签按钮样式
            document.querySelectorAll('[id^="tab-"]').forEach(el => {
                el.classList.remove('bg-primary-500', 'text-white');
                el.classList.add('text-gray-600');
            });
            document.getElementById(`tab-${tab}`).classList.add('bg-primary-500', 'text-white');
            document.getElementById(`tab-${tab}`).classList.remove('text-gray-600');

            // 加载对应数据
            if (tab === 'analysis') {
                loadAnalysis();
            } else if (tab === 'suggestions') {
                loadSuggestions();
            }
        }

        // 选择情绪
        function selectEmotion(emotion) {
            selectedEmotion = emotion;
            document.querySelectorAll('.emotion-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-primary-50');
            });
            document.querySelector(`[data-emotion="${emotion}"]`).classList.add('active', 'bg-primary-50');
        }

        // 选择强度
        function selectIntensity(intensity) {
            selectedIntensity = intensity;
            document.querySelectorAll('.intensity-dot').forEach(dot => {
                dot.classList.remove('active');
            });
            for (let i = 1; i <= intensity; i++) {
                document.querySelector(`[data-intensity="${i}"]`).classList.add('active');
            }
        }

        // 切换标签
        function toggleTag(btn) {
            const tag = btn.dataset.tag;
            if (selectedTags.includes(tag)) {
                selectedTags = selectedTags.filter(t => t !== tag);
                btn.classList.remove('bg-primary-500', 'text-white', 'border-primary-500');
            } else {
                selectedTags.push(tag);
                btn.classList.add('bg-primary-500', 'text-white', 'border-primary-500');
            }
        }

        // 保存情绪记录
        async function saveEmotion() {
            if (!selectedEmotion) {
                alert('请先选择一个情绪');
                return;
            }

            const context = document.getElementById('context').value;
            
            const record = {
                emotionType: selectedEmotion,
                intensity: selectedIntensity,
                context: context,
                tags: selectedTags,
                timestamp: new Date().toISOString()
            };

            try {
                // 保存到本地存储
                const records = JSON.parse(localStorage.getItem('emotionRecords') || '[]');
                records.push(record);
                localStorage.setItem('emotionRecords', JSON.stringify(records));

                alert('记录保存成功！');
                
                // 重置表单
                selectedEmotion = null;
                selectedIntensity = 3;
                selectedTags = [];
                document.getElementById('context').value = '';
                document.querySelectorAll('.emotion-btn').forEach(btn => {
                    btn.classList.remove('active', 'bg-primary-50');
                });
                document.querySelectorAll('.intensity-dot').forEach(dot => {
                    dot.classList.remove('active');
                });
                document.querySelectorAll('.tag-btn').forEach(btn => {
                    btn.classList.remove('bg-primary-500', 'text-white', 'border-primary-500');
                });
            } catch (error) {
                console.error('保存失败:', error);
                alert('保存失败，请重试');
            }
        }

        // 加载情绪分析
        function loadAnalysis() {
            const records = JSON.parse(localStorage.getItem('emotionRecords') || '[]');
            
            if (records.length === 0) {
                document.getElementById('emotion-distribution').innerHTML = '<p class="text-gray-400 text-center py-8">还没有记录，开始记录你的情绪吧</p>';
                document.getElementById('trigger-factors').innerHTML = '';
                return;
            }

            // 统计情绪分布
            const emotionCounts = {};
            const tagCounts = {};
            
            records.forEach(record => {
                emotionCounts[record.emotionType] = (emotionCounts[record.emotionType] || 0) + 1;
                record.tags.forEach(tag => {
                    tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                });
            });

            // 显示情绪分布
            const emotionNames = {
                happy: '开心',
                calm: '平静',
                anxious: '焦虑',
                sad: '难过',
                angry: '愤怒',
                tired: '疲惫'
            };

            const total = records.length;
            let distributionHTML = '';
            Object.entries(emotionCounts)
                .sort((a, b) => b[1] - a[1])
                .forEach(([emotion, count]) => {
                    const percentage = Math.round((count / total) * 100);
                    distributionHTML += `
                        <div class="flex items-center gap-3">
                            <span class="text-sm text-gray-600 w-16">${emotionNames[emotion]}</span>
                            <div class="flex-1 bg-gray-200 rounded-full h-3">
                                <div class="bg-primary-500 h-3 rounded-full" style="width: ${percentage}%"></div>
                            </div>
                            <span class="text-sm text-gray-600 w-12">${percentage}%</span>
                        </div>
                    `;
                });
            document.getElementById('emotion-distribution').innerHTML = distributionHTML;

            // 显示常见触发因素
            let factorsHTML = '';
            Object.entries(tagCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5)
                .forEach(([tag, count], index) => {
                    factorsHTML += `
                        <div class="flex items-center gap-2">
                            <span class="text-primary-500 font-semibold">${index + 1}.</span>
                            <span class="text-gray-700">${tag}</span>
                            <span class="text-gray-400 text-sm">(${count}次)</span>
                        </div>
                    `;
                });
            document.getElementById('trigger-factors').innerHTML = factorsHTML || '<p class="text-gray-400">暂无数据</p>';
        }

        // 加载调节建议
        function loadSuggestions() {
            const records = JSON.parse(localStorage.getItem('emotionRecords') || '[]');
            
            // 获取最近的情绪
            const recentEmotion = records.length > 0 ? records[records.length - 1].emotionType : 'anxious';
            
            const suggestions = {
                happy: [
                    { title: '感恩练习', desc: '记录3件让你感恩的事，延续积极情绪', action: 'practice.html' },
                    { title: '分享快乐', desc: '和朋友分享你的喜悦，增强幸福感', action: '#' },
                    { title: '正念冥想', desc: '5分钟正念练习，深化当下的美好', action: 'practice.html' }
                ],
                calm: [
                    { title: '呼吸觉察', desc: '1分钟呼吸练习，保持内心平静', action: 'practice.html' },
                    { title: '身体扫描', desc: '3分钟身体觉察，增强身心连接', action: 'practice.html' },
                    { title: '自然漫步', desc: '到户外走走，感受自然的宁静', action: '#' }
                ],
                anxious: [
                    { title: '5-4-3-2-1接地法', desc: '快速平静神经系统，缓解焦虑', action: '#' },
                    { title: '呼吸觉察', desc: '1分钟快速放松，降低心率', action: 'practice.html' },
                    { title: '认知重评', desc: '改变看待问题的方式，减少焦虑', action: '#' }
                ],
                sad: [
                    { title: '自我关怀', desc: '对自己温柔，接纳当下的情绪', action: '#' },
                    { title: '身体扫描', desc: '3分钟身体觉察，连接内在感受', action: 'practice.html' },
                    { title: '寻求支持', desc: '和朋友聊聊，不要独自承受', action: '#' }
                ],
                angry: [
                    { title: '深呼吸', desc: '1分钟呼吸练习，平复情绪', action: 'practice.html' },
                    { title: '身体运动', desc: '释放愤怒能量，运动10分钟', action: '#' },
                    { title: '写下感受', desc: '把愤怒写下来，理清思绪', action: '#' }
                ],
                tired: [
                    { title: '深度放松', desc: '7分钟渐进式肌肉放松', action: 'practice.html' },
                    { title: '小憩片刻', desc: '15-20分钟小睡，恢复精力', action: '#' },
                    { title: '调整作息', desc: '建立规律作息，改善睡眠', action: '#' }
                ]
            };

            const emotionSuggestions = suggestions[recentEmotion] || suggestions.anxious;
            
            let suggestionsHTML = '';
            emotionSuggestions.forEach(suggestion => {
                suggestionsHTML += `
                    <div class="border border-gray-200 rounded-xl p-6 hover:border-primary-400 hover:shadow-md transition cursor-pointer" onclick="window.location.href='${suggestion.action}'">
                        <h3 class="text-lg font-semibold text-gray-800 mb-2">${suggestion.title}</h3>
                        <p class="text-gray-600">${suggestion.desc}</p>
                    </div>
                `;
            });
            
            document.getElementById('suggestions-container').innerHTML = suggestionsHTML;
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            selectIntensity(3);
        });
    </script>
</body>
</html>
